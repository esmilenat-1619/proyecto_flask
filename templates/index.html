<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción de Cáncer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #667eea;
            color: white;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #5a67d8;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="result text-{{ color }}">
    {{ prediction_text }}
</div>

    <h2>🧠 Predicción de Cáncer</h2>

    <form action="/predict" method="post">

        <input type="number" step="any" name="f1" class="form-control mb-2" placeholder="Valor 1" required>
        <input type="number" step="any" name="f2" class="form-control mb-2" placeholder="Valor 2" required>
        <input type="number" step="any" name="f3" class="form-control mb-2" placeholder="Valor 3" required>
        <input type="number" step="any" name="f4" class="form-control mb-2" placeholder="Valor 4" required>
        <input type="number" step="any" name="f5" class="form-control mb-2" placeholder="Valor 5" required>

        <button type="submit" class="btn btn-custom mt-3">Predecir</button>

    </form>

    {% if prediction_text %}
        <div class="result text-success">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
